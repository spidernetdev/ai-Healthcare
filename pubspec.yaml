name: rural_triage_app
description: Rural Triage Assistant — Multilingual AI health triage for rural India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1

  # State Management
  get: ^4.6.6

  # AI / Network
  google_generative_ai: ^0.4.3
  http: ^1.2.1
  dio: ^5.4.3+1

  # Speech
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  cloud_functions: ^4.7.6

  # Location & Maps
  geolocator: ^12.0.0
  url_launcher: ^6.3.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: 10.0.0-beta.1

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/audio/

